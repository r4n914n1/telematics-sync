name: Telematics Sync

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions ne garantuje tacno 60 sekundi; minimum je minut po cron sintaksi,
    # ali u praksi schedule moze da kasni.
    - cron: "* * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run one sync
        env:
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: npm run sync:once
